<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>claude-baton Pipeline Dashboard</title>
<style>
  :root {
    --bg-primary: #0f1923;
    --bg-secondary: #1a2734;
    --bg-card: #1e2f3f;
    --bg-card-hover: #243a4e;
    --border: #2a3f52;
    --text-primary: #e8edf2;
    --text-secondary: #8899aa;
    --text-muted: #5a6b7c;
    --accent-blue: #3b82f6;
    --accent-green: #10b981;
    --accent-red: #ef4444;
    --accent-yellow: #f59e0b;
    --accent-purple: #8b5cf6;
    --accent-cyan: #06b6d4;
    --accent-orange: #f97316;
    --tier1: #10b981;
    --tier2: #3b82f6;
    --tier3: #8b5cf6;
    --phase-done: #10b981;
    --phase-active: #3b82f6;
    --phase-pending: #3a4a5c;
    --phase-failed: #ef4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
  }

  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .header h1 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .header h1 span { color: var(--accent-blue); }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .timestamp {
    font-size: 12px;
    color: var(--text-muted);
  }
  .btn {
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-card);
    color: var(--text-primary);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover { background: var(--bg-card-hover); border-color: var(--accent-blue); }
  .btn-primary { background: var(--accent-blue); border-color: var(--accent-blue); }
  .btn-primary:hover { background: #2563eb; }

  /* Pipeline Timeline */
  .pipeline-section {
    background: var(--bg-secondary);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
    border: 1px solid var(--border);
  }
  .section-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }
  .pipeline-timeline {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 0;
    padding: 16px 0;
    overflow-x: auto;
  }
  .phase-node {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 80px;
    position: relative;
  }
  .phase-circle {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 600;
    position: relative;
    z-index: 1;
    transition: all 0.3s;
  }
  .phase-circle.done {
    background: var(--phase-done);
    color: white;
    box-shadow: 0 0 12px rgba(16, 185, 129, 0.3);
  }
  .phase-circle.active {
    background: var(--phase-active);
    color: white;
    box-shadow: 0 0 16px rgba(59, 130, 246, 0.5);
    animation: pulse 2s ease-in-out infinite;
  }
  .phase-circle.pending {
    background: var(--phase-pending);
    color: var(--text-muted);
  }
  .phase-circle.failed {
    background: var(--phase-failed);
    color: white;
    box-shadow: 0 0 12px rgba(239, 68, 68, 0.4);
  }
  .phase-label {
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-secondary);
    text-align: center;
    white-space: nowrap;
    min-height: 30px;
  }
  .phase-connector {
    width: 40px;
    height: 3px;
    background: var(--phase-pending);
    margin-top: 19px;
    transition: background 0.3s;
  }
  .phase-connector.done { background: var(--phase-done); }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 16px rgba(59, 130, 246, 0.5); transform: scale(1); }
    50% { box-shadow: 0 0 24px rgba(59, 130, 246, 0.8); transform: scale(1.08); }
  }

  /* Status Cards Row */
  .status-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .status-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    transition: border-color 0.2s;
  }
  .status-card:hover { border-color: var(--accent-blue); }
  .status-card-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }
  .status-card-value {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .status-card-sub {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 4px;
  }
  .tier-badge {
    display: inline-block;
    padding: 4px 16px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 700;
  }
  .tier-1 { background: rgba(16, 185, 129, 0.15); color: var(--tier1); border: 1px solid rgba(16, 185, 129, 0.3); }
  .tier-2 { background: rgba(59, 130, 246, 0.15); color: var(--tier2); border: 1px solid rgba(59, 130, 246, 0.3); }
  .tier-3 { background: rgba(139, 92, 246, 0.15); color: var(--tier3); border: 1px solid rgba(139, 92, 246, 0.3); }
  .security-clear { color: var(--accent-green); }
  .security-halt { color: var(--accent-red); }

  /* Tracker Panels */
  .tracker-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  @media (max-width: 900px) { .tracker-row { grid-template-columns: 1fr; } }
  .tracker-panel {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }
  .tracker-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .tracker-title {
    font-size: 14px;
    font-weight: 600;
  }
  .tracker-count {
    font-size: 13px;
    color: var(--text-secondary);
    background: var(--bg-primary);
    padding: 2px 10px;
    border-radius: 12px;
  }
  .progress-bar {
    width: 100%;
    height: 8px;
    background: var(--bg-primary);
    border-radius: 4px;
    overflow: hidden;
    margin: 12px 0;
  }
  .progress-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.8s ease;
    background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
  }
  .progress-fill.complete { background: linear-gradient(90deg, var(--accent-green), #34d399); }
  .tracker-list {
    list-style: none;
    margin-top: 12px;
  }
  .tracker-list li {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    font-size: 13px;
    color: var(--text-secondary);
    border-bottom: 1px solid rgba(42, 63, 82, 0.5);
  }
  .tracker-list li:last-child { border-bottom: none; }
  .tracker-list .check { color: var(--accent-green); }
  .tracker-list .pending-dot { color: var(--text-muted); }

  /* Task Board */
  .task-board {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .task-cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 14px;
    margin-top: 16px;
  }
  .task-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    transition: all 0.2s;
    border-left: 3px solid var(--accent-blue);
  }
  .task-card:hover { border-color: var(--accent-blue); background: var(--bg-card-hover); }
  .task-card.done { border-left-color: var(--accent-green); opacity: 0.7; }
  .task-card.improvement { border-left-color: var(--accent-purple); }
  .task-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }
  .task-id {
    font-size: 12px;
    font-weight: 700;
    color: var(--accent-cyan);
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .task-status-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .task-status-badge.pending { background: rgba(245, 158, 11, 0.15); color: var(--accent-yellow); }
  .task-status-badge.done { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); }
  .task-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 10px;
    line-height: 1.4;
  }
  .task-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .task-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--bg-primary);
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .task-tag.stack { color: var(--accent-cyan); border-color: rgba(6, 182, 212, 0.3); }
  .task-tag.model { color: var(--accent-purple); border-color: rgba(139, 92, 246, 0.3); }
  .task-tag.assignee { color: var(--accent-orange); border-color: rgba(249, 115, 22, 0.3); }
  .task-files {
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'SF Mono', 'Fira Code', monospace;
  }

  /* Lessons */
  .lessons-section {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .lesson-entry {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-top: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .lesson-entry:hover { border-color: var(--accent-blue); }
  .lesson-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
  }
  .lesson-header:hover { background: var(--bg-card-hover); }
  .lesson-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .lesson-toggle {
    font-size: 12px;
    color: var(--text-muted);
    transition: transform 0.2s;
  }
  .lesson-toggle.open { transform: rotate(90deg); }
  .lesson-title {
    font-size: 13px;
    font-weight: 600;
  }
  .lesson-date {
    font-size: 11px;
    color: var(--text-muted);
  }
  .severity-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }
  .severity-high { background: rgba(239, 68, 68, 0.15); color: var(--accent-red); }
  .severity-medium { background: rgba(245, 158, 11, 0.15); color: var(--accent-yellow); }
  .severity-low { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); }
  .lesson-body {
    display: none;
    padding: 0 16px 16px;
    font-size: 13px;
  }
  .lesson-body.open { display: block; }
  .lesson-field {
    margin-bottom: 8px;
  }
  .lesson-field-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .lesson-field-value {
    color: var(--text-secondary);
    margin-top: 2px;
    line-height: 1.5;
  }
  .lesson-rule {
    background: var(--bg-primary);
    border-left: 3px solid var(--accent-yellow);
    padding: 8px 12px;
    border-radius: 0 6px 6px 0;
    font-size: 12px;
    color: var(--accent-yellow);
    margin-top: 8px;
  }

  /* Complexity */
  .complexity-section {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .complexity-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    margin-top: 16px;
  }
  @media (max-width: 768px) { .complexity-grid { grid-template-columns: 1fr; } }
  .score-table {
    width: 100%;
    border-collapse: collapse;
  }
  .score-table th, .score-table td {
    padding: 10px 14px;
    text-align: left;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
  }
  .score-table th {
    color: var(--text-muted);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .score-table td:nth-child(2) {
    text-align: center;
    font-weight: 700;
    font-family: 'SF Mono', 'Fira Code', monospace;
  }
  .score-total {
    font-weight: 700;
    color: var(--accent-blue);
    font-size: 15px;
  }
  .stack-table {
    width: 100%;
    border-collapse: collapse;
  }
  .stack-table th, .stack-table td {
    padding: 10px 14px;
    text-align: left;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
  }
  .stack-table th {
    color: var(--text-muted);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .stack-tag-cell {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 12px;
    color: var(--accent-cyan);
  }

  /* Radar Chart */
  .radar-container {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 16px;
  }
  .radar-container canvas {
    max-width: 280px;
    max-height: 280px;
  }

  /* Drop Zone */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 24px;
    text-align: center;
    margin-bottom: 24px;
    transition: all 0.3s;
    background: var(--bg-secondary);
  }
  .drop-zone.drag-over {
    border-color: var(--accent-blue);
    background: rgba(59, 130, 246, 0.05);
  }
  .drop-zone-icon { font-size: 32px; margin-bottom: 8px; }
  .drop-zone-text { font-size: 13px; color: var(--text-secondary); }
  .drop-zone-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .file-input { display: none; }
  .load-buttons {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 12px;
  }

  /* Toast notifications */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--bg-card);
    border: 1px solid var(--accent-green);
    border-radius: 8px;
    padding: 12px 20px;
    font-size: 13px;
    color: var(--accent-green);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
    z-index: 1000;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { border-color: var(--accent-red); color: var(--accent-red); }

  /* Responsive */
  @media (max-width: 768px) {
    .container { padding: 12px; }
    .header { flex-direction: column; gap: 12px; }
    .status-row { grid-template-columns: repeat(2, 1fr); }
    .task-cards { grid-template-columns: 1fr; }
  }
</style>
</head>

<div class="container">
  <!-- Header -->
  <div class="header">
    <h1><span>&#9670;</span> claude-baton <span style="font-weight:400;font-size:16px;color:var(--text-secondary)">Pipeline Dashboard</span></h1>
    <div class="header-right">
      <span id="conn-status" style="display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--text-muted)">
        <span id="conn-dot" style="width:8px;height:8px;border-radius:50%;background:var(--text-muted);display:inline-block"></span>
        <span id="conn-label">Checking...</span>
      </span>
      <span class="timestamp" id="timestamp">--</span>
      <button class="btn" onclick="fetchAndRender()">&#8635; Refresh</button>
      <button class="btn" id="auto-refresh-btn" onclick="toggleAutoRefresh()" style="min-width:120px">&#9654; Auto 20s</button>
    </div>
  </div>

  <!-- Pipeline Timeline -->
  <div class="pipeline-section">
    <div class="section-title">Pipeline Progress</div>
    <div class="pipeline-timeline" id="pipeline-timeline"></div>
  </div>

  <!-- Status Cards -->
  <div class="status-row" id="status-cards"></div>

  <!-- Tracker Panels -->
  <div class="tracker-row" id="tracker-panels"></div>

  <!-- Task Board -->
  <div class="task-board">
    <div class="section-title">Task Board</div>
    <div class="task-cards" id="task-cards"></div>
  </div>

  <!-- Lessons Learned -->
  <div class="lessons-section">
    <div class="section-title">Lessons Learned</div>
    <div id="lessons-list"></div>
  </div>

  <!-- Complexity Score -->
  <div class="complexity-section">
    <div class="section-title">Complexity Score</div>
    <div class="complexity-grid" id="complexity-grid"></div>
  </div>

  <!-- File Loader -->
  <div class="drop-zone" id="drop-zone">
    <div class="drop-zone-icon">&#128193;</div>
    <div class="drop-zone-text">Drag &amp; drop files here to update dashboard</div>
    <div class="drop-zone-sub">Accepts: state.json, todo.md, lessons.md, complexity-score.md</div>
    <div class="load-buttons">
      <button class="btn" onclick="document.getElementById('file-state').click()">Load state.json</button>
      <button class="btn" onclick="document.getElementById('file-todo').click()">Load todo.md</button>
      <button class="btn" onclick="document.getElementById('file-lessons').click()">Load lessons.md</button>
      <button class="btn" onclick="document.getElementById('file-complexity').click()">Load complexity-score.md</button>
    </div>
    <input type="file" id="file-state" class="file-input" accept=".json" onchange="handleFileSelect(this, 'state')">
    <input type="file" id="file-todo" class="file-input" accept=".md" onchange="handleFileSelect(this, 'todo')">
    <input type="file" id="file-lessons" class="file-input" accept=".md" onchange="handleFileSelect(this, 'lessons')">
    <input type="file" id="file-complexity" class="file-input" accept=".md" onchange="handleFileSelect(this, 'complexity')">
  </div>
</div>

<div class="toast" id="toast"></div>

## 2026-03-24: Phase 1 Security Hardening

### SEC-05 과잉 차단 — state.json 읽기도 차단됨

function getPhaseStatus(phase, state) {
  if (phase.computed) {
    // Done = all flags true
    const allDone = Object.values(state.phaseFlags).every(v => v === true);
    return allDone ? 'done' : 'pending';
  }
  if (state.securityHalt && state.currentPhase === phase.key) return 'failed';
  if (phase.flags) {
    const allPassed = phase.flags.every(f => state.phaseFlags[f]);
    if (allPassed) return 'done';
  } else if (phase.flag && state.phaseFlags[phase.flag]) {
    return 'done';
  }
  if (state.currentPhase === phase.key) return 'active';
  return 'pending';
}

function parseTodoTasks(md) {
  const tasks = [];
  const lines = md.split('\n');
  let i = 0;
  while (i < lines.length) {
    const taskMatch = lines[i].match(/^- \[([ xX])\] ((?:task|improvement)-\d+):\s*(.*)/);
    if (taskMatch) {
      const done = taskMatch[1] !== ' ';
      const id = taskMatch[2];
      const title = taskMatch[3];
      const isImprovement = id.startsWith('improvement');
      const meta = {};
      // Read indented meta lines
      let j = i + 1;
      while (j < lines.length && /^\s{4,}/.test(lines[j]) && lines[j].trim() !== '') {
        const line = lines[j].trim();
        const kvMatch = line.match(/^(\w+):\s*(.*)/);
        if (kvMatch) meta[kvMatch[1]] = kvMatch[2];
        j++;
      }
      tasks.push({ done, id, title, isImprovement, meta });
      i = j;
    } else {
      i++;
    }
  }
  return tasks;
}

function renderTasks() {
  const el = document.getElementById('task-cards');
  const tasks = parseTodoTasks(currentTodo);
  if (tasks.length === 0) {
    el.innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding:16px;">No tasks found.</div>';
    return;
  }
  el.innerHTML = tasks.map(t => {
    const cls = t.done ? 'done' : t.isImprovement ? 'improvement' : '';
    const statusBadge = t.done ?
      '<span class="task-status-badge done">Done</span>' :
      '<span class="task-status-badge pending">Pending</span>';
    let metaHtml = '';
    if (t.meta.assignee) {

      parts.forEach(p => {
        if (p.startsWith('model:')) metaHtml += `<span class="task-tag model">${p}</span>`;
        else metaHtml += `<span class="task-tag assignee">${p}</span>`;
      });
    }
    if (t.meta.stack) metaHtml += `<span class="task-tag stack">${t.meta.stack}</span>`;
    if (t.meta.skill) metaHtml += `<span class="task-tag">${t.meta.skill}</span>`;

    const filesStr = t.meta.files || '';
    const filesClean = filesStr.replace(/[\[\]]/g, '');

    return `<div class="task-card ${cls}">
      <div class="task-card-header">
        <span class="task-id">${t.id}</span>

      ${filesClean ? `<div class="task-files">&#128196; ${filesClean}</div>` : ''}
    </div>`;
  }).join('');
}

function parseLessons(md) {
  const lessons = [];
  const sections = md.split(/^## /m).filter(s => s.trim());
  sections.forEach(section => {
    const dateMatch = section.match(/^([\d-]+):\s*(.*)/);
    if (!dateMatch) return;
    const date = dateMatch[1];
    const sectionTitle = dateMatch[2];
    const entries = section.split(/^### /m).filter(s => s.trim());
    entries.slice(1).forEach(entry => {
      const entryLines = entry.split('\n');
      const title = entryLines[0].trim();
      let problem = '', cause = '', solution = '', rule = '';
      entryLines.forEach(line => {
        const l = line.trim();
        if (l.startsWith('- **문제:**') || l.startsWith('- **Problem:**')) problem = l.replace(/^- \*\*[^*]+\*\*\s*/, '');
        if (l.startsWith('- **원인:**') || l.startsWith('- **Cause:**')) cause = l.replace(/^- \*\*[^*]+\*\*\s*/, '');
        if (l.startsWith('- **해결:**') || l.startsWith('- **Solution:**')) solution = l.replace(/^- \*\*[^*]+\*\*\s*/, '');
        if (l.startsWith('- **수정 방향:**')) solution = solution || l.replace(/^- \*\*[^*]+\*\*\s*/, '');
        if (l.startsWith('- **Rule:**')) rule = l.replace(/^- \*\*Rule:\*\*\s*/, '');
      });
      lessons.push({ date, sectionTitle, title, problem, cause, solution, rule });
    });
  });
  return lessons;
}

function parseComplexity(md) {
  const result = { scores: [], stacks: [], total: 0, tier: '--' };

  // Parse score table
  const scoreTableMatch = md.match(/\| Criterion \| Score \| Rationale \|\n\|[-|]+\|\n([\s\S]*?)(?:\n\n|\*\*Total)/);
  if (scoreTableMatch) {
    const rows = scoreTableMatch[1].trim().split('\n');
    rows.forEach(row => {
      const cols = row.split('|').map(c => c.trim()).filter(c => c);
      if (cols.length >= 3) {
        result.scores.push({ criterion: cols[0], score: parseInt(cols[1]) || 0, rationale: cols[2] });
      }
    });
  }

  const totalMatch = md.match(/\*\*Total:\s*(\d+)\s*pts?\*\*/);
  if (totalMatch) result.total = parseInt(totalMatch[1]);

  const tierMatch = md.match(/##\s*TIER:\s*(\d+)/);
  if (tierMatch) result.tier = tierMatch[1];

  // Parse stack table
  const stackTableMatch = md.match(/\| Path \| Stack \| Evidence[^\n]*\|\n\|[-|]+\|\n([\s\S]*?)(?:\n\n|\n##|\n\*\*)/);
  if (stackTableMatch) {
    const rows = stackTableMatch[1].trim().split('\n');
    rows.forEach(row => {
      const cols = row.split('|').map(c => c.trim()).filter(c => c);
      if (cols.length >= 3) {
        result.stacks.push({ path: cols[0], stack: cols[1], evidence: cols[2] });
      }
    });
  }

  return result;
}

function drawRadar(scores) {
  const canvas = document.getElementById('radar-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const cx = 140, cy = 140, r = 100;
  const n = scores.length;
  if (n < 3) return;

  ctx.clearRect(0, 0, 280, 280);

  // Draw grid
  for (let ring = 1; ring <= 3; ring++) {
    const rr = r * ring / 3;
    ctx.beginPath();
    for (let i = 0; i <= n; i++) {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      const x = cx + rr * Math.cos(angle);
      const y = cy + rr * Math.sin(angle);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = 'rgba(42, 63, 82, 0.6)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Draw axes
  for (let i = 0; i < n; i++) {
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
    ctx.strokeStyle = 'rgba(42, 63, 82, 0.4)';
    ctx.stroke();

    // Labels
    const lx = cx + (r + 18) * Math.cos(angle);
    const ly = cy + (r + 18) * Math.sin(angle);
    ctx.fillStyle = '#8899aa';
    ctx.font = '9px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const label = scores[i].criterion.length > 12 ? scores[i].criterion.substring(0, 12) + '..' : scores[i].criterion;
    ctx.fillText(label, lx, ly);
  }

  // Draw data polygon
  ctx.beginPath();
  const maxVal = 3;
  for (let i = 0; i <= n; i++) {
    const idx = i % n;
    const val = Math.min(scores[idx].score, maxVal);
    const pct = val / maxVal;
    const angle = (Math.PI * 2 * idx / n) - Math.PI / 2;
    const x = cx + r * pct * Math.cos(angle);
    const y = cy + r * pct * Math.sin(angle);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(59, 130, 246, 0.2)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(59, 130, 246, 0.8)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Draw data points
  for (let i = 0; i < n; i++) {
    const val = Math.min(scores[i].score, maxVal);
    const pct = val / maxVal;
    const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
    const x = cx + r * pct * Math.cos(angle);
    const y = cy + r * pct * Math.sin(angle);
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = val > 0 ? '#3b82f6' : '#3a4a5c';
    ctx.fill();
    ctx.strokeStyle = val > 0 ? '#60a5fa' : '#3a4a5c';
    ctx.lineWidth = 2;
    ctx.stroke();
  }
}

function renderTimestamp() {
  const ts = currentState.timestamp;
  if (ts) {
    const d = new Date(ts);
    document.getElementById('timestamp').textContent = 'Data: ' + d.toLocaleString();
  } else {
    document.getElementById('timestamp').textContent = 'Data: --';
  }
}

function renderAll() {
  renderPipeline();
  renderStatusCards();
  renderTrackers();
  renderTasks();
  renderLessons();
  renderComplexity();
  renderTimestamp();
}

// ============================================================
// FILE LOADING
// ============================================================

function showToast(msg, isError) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast' + (isError ? ' error' : '');
  setTimeout(() => toast.classList.add('show'), 10);
  setTimeout(() => toast.classList.remove('show'), 3000);
}

function handleFileSelect(input, type) {
  const file = input.files[0];
  if (!file) return;
  loadFile(file, type);
  input.value = '';
}

function loadFile(file, type) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const content = e.target.result;
    try {
      if (type === 'state') {
        currentState = JSON.parse(content);
        showToast('state.json loaded successfully');
      } else if (type === 'todo') {
        currentTodo = content;
        showToast('todo.md loaded successfully');
      } else if (type === 'lessons') {
        currentLessons = content;
        showToast('lessons.md loaded successfully');
      } else if (type === 'complexity') {
        currentComplexity = content;
        showToast('complexity-score.md loaded successfully');
      }
      renderAll();
    } catch (err) {
      showToast('Error parsing file: ' + err.message, true);
    }
  };
  reader.readAsText(file);
}

function detectFileType(name) {
  if (name === 'state.json' || name.endsWith('state.json')) return 'state';
  if (name.includes('todo')) return 'todo';
  if (name.includes('lesson')) return 'lessons';
  if (name.includes('complexity') || name.includes('score')) return 'complexity';
  if (name.endsWith('.json')) return 'state';
  return null;
}

// Drag and drop
const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const files = e.dataTransfer.files;
  for (let i = 0; i < files.length; i++) {
    const type = detectFileType(files[i].name);
    if (type) {
      loadFile(files[i], type);
    } else {
      showToast('Unknown file type: ' + files[i].name, true);
    }
  }
});

// ============================================================
// CONNECTION STATUS
// ============================================================
let isLive = false;
let hadConnection = false;

function setConnectionStatus(status) {
  const dot = document.getElementById('conn-dot');
  const label = document.getElementById('conn-label');
  if (status === 'live') {
    dot.style.background = 'var(--accent-green)';
    label.textContent = 'Live';
    label.style.color = 'var(--accent-green)';
    isLive = true; hadConnection = true;
  } else if (status === 'offline') {
    dot.style.background = 'var(--accent-yellow)';
    label.textContent = 'Offline';
    label.style.color = 'var(--accent-yellow)';
    isLive = false;
  } else if (status === 'error') {
    dot.style.background = 'var(--accent-red)';
    label.textContent = 'Error';
    label.style.color = 'var(--accent-red)';
    isLive = false;
  }
}

// ============================================================
// LIVE FETCH
// ============================================================
async function fetchAndRender() {
  try {
    const [stateRes, todoRes, lessonsRes, complexityRes] = await Promise.allSettled([
      fetch('/api/state'),
      fetch('/api/todo'),
      fetch('/api/lessons'),
      fetch('/api/complexity'),
    ]);

    let anyOk = false;

    if (stateRes.status === 'fulfilled' && stateRes.value.ok) {
      try { currentState = await stateRes.value.json(); anyOk = true; } catch (_) {}
    }
    if (todoRes.status === 'fulfilled' && todoRes.value.ok) {
      currentTodo = await todoRes.value.text(); anyOk = true;
    }
    if (lessonsRes.status === 'fulfilled' && lessonsRes.value.ok) {
      currentLessons = await lessonsRes.value.text(); anyOk = true;
    }
    if (complexityRes.status === 'fulfilled' && complexityRes.value.ok) {
      currentComplexity = await complexityRes.value.text(); anyOk = true;
    }

    if (anyOk) {
      setConnectionStatus('live');
    } else if (hadConnection) {
      setConnectionStatus('error');
    }

    renderAll();
  } catch (err) {
    // Network error — server not reachable
    if (hadConnection) {
      setConnectionStatus('error');
    } else {
      setConnectionStatus('offline');
      showToast('\u26A0 Running in offline mode \u2014 drag & drop files to update');
    }
    renderAll();
  }
}

// ============================================================
// AUTO-REFRESH (20s)
// ============================================================
let autoRefreshTimer = null;

function toggleAutoRefresh() {
  const btn = document.getElementById('auto-refresh-btn');
  if (autoRefreshTimer) {
    clearInterval(autoRefreshTimer);
    autoRefreshTimer = null;
    btn.innerHTML = '&#9654; Auto 20s';
    btn.style.background = '';
    showToast('Auto-refresh stopped');
  } else {
    autoRefreshTimer = setInterval(fetchAndRender, 20000);
    btn.innerHTML = '&#9724; Auto 20s';
    btn.style.background = 'var(--accent-green)';
    showToast('Auto-refresh every 20s');
  }
}

// ============================================================
// INIT
// ============================================================
renderAll();
fetchAndRender();
toggleAutoRefresh();
</script>
